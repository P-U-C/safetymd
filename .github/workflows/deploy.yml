name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Inject Cloudflare resource IDs
        run: |
          sed -i "s/REPLACE_WITH_ACTUAL_ID/${{ secrets.CF_D1_DATABASE_ID }}/g" wrangler.toml
          sed -i "s/REPLACE_WITH_ACTUAL_KV_ID/${{ secrets.CF_KV_NAMESPACE_ID }}/g" wrangler.toml
          sed -i "s/REPLACE_WITH_ACTUAL_PREVIEW_ID/${{ secrets.CF_KV_PREVIEW_ID }}/g" wrangler.toml

      - name: Run DB migrations
        run: npx wrangler d1 execute safetymd --remote --file=migrations/0001_init.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Seed database (first deploy only — idempotent)
        run: npx wrangler d1 execute safetymd --remote --file=seed/seed.sql
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://safetymd.workers.dev/v1/health)
          echo "Health check: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
        continue-on-error: true
