name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build static docs site
        run: |
          mkdir -p _site
          # Extract landing page HTML from TypeScript source
          node -e "
          const fs = require('fs');
          const src = fs.readFileSync('src/landing.ts', 'utf8');
          // Pull the HTML string from the template literal
          const match = src.match(/export const landingPage = \`([\s\S]*?)\`;/);
          if (match) {
            fs.writeFileSync('_site/index.html', match[1]);
          } else {
            // Fallback: generate a simple redirect page
            fs.writeFileSync('_site/index.html', \`<!DOCTYPE html>
          <html>
          <head><meta charset=\"utf-8\"><title>safety.md</title>
          <meta http-equiv=\"refresh\" content=\"0;url=https://github.com/P-U-C/safetymd\">
          </head><body><a href=\"https://github.com/P-U-C/safetymd\">safety.md on GitHub</a></body>
          </html>\`);
          }
          "
          cp README.md _site/README.md 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
