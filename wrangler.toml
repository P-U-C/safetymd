name = "safetymd"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "safetymd"
database_id = "REPLACE_WITH_ACTUAL_ID"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_ACTUAL_KV_ID"
preview_id = "REPLACE_WITH_ACTUAL_PREVIEW_ID"

[triggers]
crons = ["0 2 * * *"]

[vars]
ENVIRONMENT = "production"
